databaseChangeLog:
  - changeSet:
      id: orders-001
      author: modulith-spike
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sku
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: int
                  constraints:
                    nullable: false
